name: Deploy Site to GitHub Pages

on:
    # Runs on pushes targeting the main branch
    push:
        branches: ["main"]
    # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
    contents: read
    pages: write
    id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    # Build job
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: 10
                  run_install: false

            - name: Setup pnpm cache
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "pnpm"

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Build with Vite and Turborepo
              # Only build the site project and its dependencies
              run: pnpm turbo run build --filter @kongzijs/site
              # If your Vite config doesn't automatically output to a specific folder for Pages,
              # it will typically be in `site/dist`.

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  # the path to the Vite build directory inside your monorepo
                  path: "./site/dist"

    # Deployment job
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        needs: build
        runs-on: ubuntu-latest
        name: Deploy
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
